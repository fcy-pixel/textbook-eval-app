<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華基督教會基慈小學 - 課本評選系統</title>
<style>
  :root {
    --primary: #1a5276;
    --primary-light: #2980b9;
    --accent: #27ae60;
    --bg: #f5f7fa;
    --card: #ffffff;
    --border: #dce1e8;
    --text: #2c3e50;
    --text-light: #7f8c8d;
    --score4: #27ae60;
    --score3: #2980b9;
    --score2: #f39c12;
    --score1: #e74c3c;
    --danger: #e74c3c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
  }
  header {
    background: linear-gradient(135deg, var(--primary), var(--primary-light));
    color: white;
    padding: 20px 24px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  header h1 { font-size: 1.3em; font-weight: 600; }
  header p { font-size: 0.85em; opacity: 0.85; margin-top: 4px; }

  .container { max-width: 900px; margin: 0 auto; padding: 16px; }

  /* Subject tabs */
  .subject-tabs {
    display: flex;
    gap: 8px;
    margin: 16px 0;
    flex-wrap: wrap;
  }
  .subject-tab {
    flex: 1;
    min-width: 120px;
    padding: 14px 12px;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: var(--card);
    cursor: pointer;
    text-align: center;
    font-size: 0.95em;
    font-weight: 600;
    transition: all 0.2s;
  }
  .subject-tab:hover { border-color: var(--primary-light); }
  .subject-tab.active {
    border-color: var(--primary);
    background: var(--primary);
    color: white;
  }

  /* Teacher info */
  .teacher-info {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 20px;
    margin-bottom: 16px;
    border: 1px solid var(--border);
  }
  .teacher-info label { font-size: 0.85em; color: var(--text-light); display: block; margin-bottom: 4px; }
  .teacher-info input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 1em;
    margin-bottom: 8px;
  }

  /* Section card */
  .section-card {
    background: var(--card);
    border-radius: 10px;
    margin-bottom: 12px;
    border: 1px solid var(--border);
    overflow: hidden;
  }
  .section-header {
    padding: 12px 16px;
    background: #eaf2f8;
    font-weight: 700;
    font-size: 1em;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    user-select: none;
  }
  .section-header .arrow { transition: transform 0.2s; font-size: 0.8em; }
  .section-header.collapsed .arrow { transform: rotate(-90deg); }
  .section-header.partB { background: #fef9e7; }
  .section-body { padding: 0; }
  .section-body.hidden { display: none; }

  /* Criteria row */
  .criteria-row {
    padding: 10px 16px;
    border-bottom: 1px solid #f0f2f5;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-start;
    gap: 8px;
  }
  .criteria-row:last-child { border-bottom: none; }
  .criteria-text {
    flex: 1;
    min-width: 200px;
    font-size: 0.9em;
    padding-top: 4px;
  }
  .criteria-subcategory {
    font-size: 0.75em;
    color: var(--primary-light);
    font-weight: 600;
    display: block;
    margin-bottom: 2px;
  }

  /* Score buttons */
  .score-group {
    display: flex;
    gap: 4px;
    flex-wrap: nowrap;
  }
  .publisher-scores {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .publisher-label {
    font-size: 0.7em;
    font-weight: 600;
    color: var(--text-light);
    text-align: center;
    min-width: 50px;
  }
  .publisher-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .score-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: white;
    cursor: pointer;
    font-weight: 700;
    font-size: 0.85em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .score-btn:hover { transform: scale(1.1); }
  .score-btn.selected-4 { background: var(--score4); color: white; border-color: var(--score4); }
  .score-btn.selected-3 { background: var(--score3); color: white; border-color: var(--score3); }
  .score-btn.selected-2 { background: var(--score2); color: white; border-color: var(--score2); }
  .score-btn.selected-1 { background: var(--score1); color: white; border-color: var(--score1); }

  /* Scores container */
  .scores-container {
    display: flex;
    gap: 8px;
  }
  .pub-score-row {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  /* Publisher header row */
  .publisher-headers {
    display: flex;
    gap: 4px;
    justify-content: flex-end;
    padding: 8px 16px;
    background: #f8f9fa;
    border-bottom: 1px solid var(--border);
  }
  .pub-header-item {
    width: 164px;
    text-align: center;
    font-size: 0.8em;
    font-weight: 700;
    color: var(--primary);
  }

  /* Comment */
  .comment-area {
    background: var(--card);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 16px 0;
    border: 1px solid var(--border);
  }
  .comment-area label { font-weight: 600; display: block; margin-bottom: 8px; }
  .comment-area textarea {
    width: 100%;
    min-height: 80px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    font-size: 0.95em;
    font-family: inherit;
    resize: vertical;
  }

  /* Summary */
  .summary-card {
    background: var(--card);
    border-radius: 10px;
    padding: 20px;
    margin: 16px 0;
    border: 2px solid var(--primary-light);
  }
  .summary-card h3 { color: var(--primary); margin-bottom: 12px; }
  .summary-table {
    width: 100%;
    border-collapse: collapse;
  }
  .summary-table th, .summary-table td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: center;
    font-size: 0.9em;
  }
  .summary-table th { background: #eaf2f8; font-weight: 600; }
  .summary-table .total-row { background: #fef9e7; font-weight: 700; }

  /* Buttons */
  .btn-group { display: flex; gap: 10px; margin: 16px 0; flex-wrap: wrap; }
  .btn {
    padding: 12px 24px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    font-size: 0.95em;
    font-weight: 600;
    transition: all 0.2s;
    flex: 1;
    min-width: 140px;
    text-align: center;
  }
  .btn-primary { background: var(--primary); color: white; }
  .btn-primary:hover { background: var(--primary-light); }
  .btn-success { background: var(--accent); color: white; }
  .btn-success:hover { background: #219a52; }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:hover { background: #c0392b; }
  .btn-outline {
    background: white;
    color: var(--primary);
    border: 2px solid var(--primary);
  }
  .btn-outline:hover { background: var(--primary); color: white; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--text);
    color: white;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 0.9em;
    transition: transform 0.3s;
    z-index: 999;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* Admin panel */
  .admin-panel {
    background: var(--card);
    border-radius: 10px;
    padding: 20px;
    margin: 16px 0;
    border: 2px solid var(--accent);
  }
  .admin-panel h3 { color: var(--accent); margin-bottom: 12px; }
  .result-row {
    padding: 10px 0;
    border-bottom: 1px solid #f0f2f5;
  }
  .result-row:last-child { border-bottom: none; }
  .result-teacher { font-weight: 600; }
  .result-date { font-size: 0.8em; color: var(--text-light); }
  .result-scores { font-size: 0.85em; margin-top: 4px; }

  /* Responsive - Mobile portrait */
  @media (max-width: 600px) {
    header { padding: 14px 16px; }
    header h1 { font-size: 1.1em; }
    .container { padding: 10px; }
    .subject-tab { min-width: 80px; padding: 10px 8px; font-size: 0.85em; }
    .criteria-row {
      flex-direction: column;
      padding: 10px 12px;
      gap: 6px;
    }
    .criteria-text { min-width: unset; font-size: 0.85em; }
    .publisher-headers { display: none; }
    .pub-header-item { width: auto; }
    .score-btn { width: 32px; height: 32px; font-size: 0.8em; }
    .scores-container {
      display: flex;
      flex-direction: column;
      gap: 6px;
      width: 100%;
    }
    .pub-score-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .mobile-pub-label {
      display: block !important;
      min-width: 36px;
      font-size: 0.8em;
      font-weight: 700;
      color: var(--primary);
    }
    .summary-table th, .summary-table td { padding: 6px 4px; font-size: 0.8em; }
    .summary-card { padding: 12px; }
    .admin-panel { padding: 12px; }
    .comment-area { padding: 12px; }
    .login-box { margin: 30px auto; padding: 24px 20px; }
    .btn { padding: 10px 16px; font-size: 0.9em; min-width: 100px; }
    .section-header { padding: 10px 12px; font-size: 0.9em; }
    .teacher-info { padding: 12px; }
  }

  .page { display: none; }
  .page.active { display: block; }

  /* Login */
  .login-box {
    max-width: 400px;
    margin: 60px auto;
    background: var(--card);
    border-radius: 12px;
    padding: 32px;
    border: 1px solid var(--border);
    text-align: center;
  }
  .login-box h2 { margin-bottom: 20px; color: var(--primary); }
  .login-box input {
    width: 100%;
    padding: 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 1em;
    margin-bottom: 12px;
  }
  .login-box .btn { width: 100%; }

  /* Progress bar */
  .progress-bar-container {
    background: #e8e8e8;
    border-radius: 10px;
    height: 8px;
    margin: 8px 0 16px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--primary-light));
    border-radius: 10px;
    transition: width 0.3s;
  }
  .progress-text { font-size: 0.8em; color: var(--text-light); text-align: right; }

  .view-toggle {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .view-toggle .btn { flex: none; padding: 8px 16px; font-size: 0.85em; }
  .view-toggle .btn.active-view { background: var(--primary); color: white; }
</style>
</head>
<body>

<header>
  <h1>中華基督教會基慈小學</h1>
  <p>2026-2027年度 課本評選系統</p>
</header>

<div class="container">
  <!-- LOGIN PAGE -->
  <div id="page-login" class="page active">
    <div class="login-box">
      <h2>教師登入</h2>
      <input type="text" id="login-name" placeholder="姓名">
      <div class="btn-group" style="margin-top: 8px;">
        <button class="btn btn-primary" onclick="doLogin()">開始評分</button>
      </div>
      <div style="margin-top: 16px; border-top: 1px solid var(--border); padding-top: 16px;">
        <input type="password" id="admin-password" placeholder="管理員密碼">
        <button class="btn btn-outline" onclick="showAdmin()" style="font-size: 0.85em; margin-top:8px;">查看統計報告</button>
      </div>
    </div>
  </div>

  <!-- EVALUATION PAGE -->
  <div id="page-eval" class="page">
    <div class="teacher-info">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <div>
          <label>教師：<strong id="display-teacher"></strong></label>
          <label>日期：<strong id="display-date"></strong></label>
        </div>
        <button class="btn btn-outline" onclick="logout()" style="flex:none; padding:6px 14px; font-size:0.8em;">登出</button>
      </div>
    </div>

    <div class="subject-tabs" id="subject-tabs"></div>

    <div class="progress-bar-container">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progress-text">0 / 0 已評分</div>

    <div id="form-container"></div>

    <div class="comment-area">
      <label>整體評語：</label>
      <textarea id="comment" placeholder="請填寫整體評語..."></textarea>
    </div>

    <div class="summary-card" id="summary-card">
      <h3>分數摘要</h3>
      <table class="summary-table" id="summary-table"></table>
    </div>

    <div class="btn-group">
      <button class="btn btn-success" onclick="submitForm()">提交評分</button>
      <button class="btn btn-outline" onclick="clearForm()">清除重填</button>
    </div>
  </div>

  <!-- ADMIN PAGE -->
  <div id="page-admin" class="page">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="color:var(--primary);">統計報告</h2>
      <button class="btn btn-outline" onclick="backToLogin()" style="flex:none; padding:6px 14px; font-size:0.85em;">返回</button>
    </div>

    <div class="subject-tabs" id="admin-subject-tabs"></div>

    <div class="view-toggle">
      <button class="btn btn-outline active-view" id="btn-view-summary" onclick="switchAdminView('summary')">整體統計</button>
      <button class="btn btn-outline" id="btn-view-detail" onclick="switchAdminView('detail')">個別記錄</button>
    </div>

    <div id="admin-summary" class="admin-panel">
      <h3>平均分統計</h3>
      <div id="admin-summary-content"></div>
    </div>

    <div id="admin-detail" class="admin-panel" style="display:none;">
      <h3>個別教師評分記錄</h3>
      <div id="admin-detail-content"></div>
    </div>
  </div>
</div>

<!-- SUCCESS PAGE -->
<div id="page-success" class="page">
  <div style="text-align:center; padding:60px 20px;">
    <div style="font-size:64px; margin-bottom:16px;">&#10003;</div>
    <h2 style="color:var(--primary); margin-bottom:4px;">中華基督教會基慈小學</h2>
    <h2 style="color:var(--primary); margin-bottom:12px;">評分已成功提交！</h2>
    <p style="color:var(--text-light); font-size:1.05em; margin-bottom:8px;">感謝你完成<strong id="success-subject"></strong>的課本評選。</p>
    <p style="color:var(--text-light); font-size:0.9em; margin-bottom:32px;">你的評分已記錄到系統中。</p>
    <div class="btn-group" style="max-width:400px; margin:0 auto;">
      <button class="btn btn-primary" onclick="backToEval()">繼續評選其他科目</button>
      <button class="btn btn-outline" onclick="logout()">返回登入頁面</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>

//  DATA: All 3 subjects' evaluation criteria
// ══════════════════════════════════════════════════════════════

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));

  window.scrollTo(0, 0);
}

function doLogin() {
  const name = document.getElementById('login-name').value.trim();
  if (!name) { showToast('請輸入姓名'); return; }
  currentTeacher = name;
  document.getElementById('display-teacher').textContent = name;
  document.getElementById('display-date').textContent = new Date().toLocaleDateString('zh-HK');
  showPage('eval');
  renderSubjectTabs();
  switchSubject('science');
}

  showPage('login');

  showPage('eval');
  renderSubjectTabs();

function renderSubjectTabs() {
  const container = document.getElementById('subject-tabs');
  container.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([key, subj]) => {
    const tab = document.createElement('div');
    tab.className = 'subject-tab' + (key === currentSubject ? ' active' : '');
    tab.textContent = subj.name;
    tab.onclick = () => switchSubject(key);
    container.appendChild(tab);
  });
}

function switchSubject(key) {
  currentSubject = key;
  renderSubjectTabs();
  renderForm();
  updateSummary();
  updateProgress();
}

function renderAdminTabs() {
  const container = document.getElementById('admin-subject-tabs');
  container.innerHTML = '';
  Object.entries(SUBJECTS).forEach(([key, subj]) => {
    const tab = document.createElement('div');
    tab.className = 'subject-tab' + (key === adminSubject ? ' active' : '');
    tab.textContent = subj.name;
    tab.onclick = () => { adminSubject = key; renderAdminTabs(); loadAdminData(); };
    container.appendChild(tab);
  });
}

// ══════════════════════════════════════════════════════════════
//  Form Rendering
// ══════════════════════════════════════════════════════════════

function renderForm() {
  const subj = SUBJECTS[currentSubject];
  const container = document.getElementById('form-container');
  container.innerHTML = '';

  const allParts = subj.partA ? ['A', 'B'] : ['A'];

  allParts.forEach(partKey => {
    if (partKey === 'A' && subj.partA) {
      const h = document.createElement('h3');
      h.style.cssText = 'margin:16px 0 8px; color:var(--primary);';
      h.textContent = subj.partA;
      container.appendChild(h);
    }
    if (partKey === 'B' && subj.partB) {
      const h = document.createElement('h3');
      h.style.cssText = 'margin:16px 0 8px; color:#e67e22;';
      h.textContent = subj.partB;
      container.appendChild(h);
    }

    const sections = subj.sections[partKey] || [];
    sections.forEach(sec => {
      const card = document.createElement('div');
      card.className = 'section-card';

      const header = document.createElement('div');
      header.className = 'section-header' + (partKey === 'B' ? ' partB' : '');
      header.innerHTML = `<span>${sec.title}</span><span class="arrow">▼</span>`;
      header.onclick = () => {
        header.classList.toggle('collapsed');
        body.classList.toggle('hidden');
      };
      card.appendChild(header);

      const body = document.createElement('div');
      body.className = 'section-body';

      // Publisher headers
      const phDiv = document.createElement('div');
      phDiv.className = 'publisher-headers';
      subj.publishers.forEach(pub => {
        const ph = document.createElement('div');
        ph.className = 'pub-header-item';
        ph.textContent = pub;
        phDiv.appendChild(ph);
      });
      body.appendChild(phDiv);

      // Items
      if (sec.items) {
        sec.items.forEach((item, idx) => {
          body.appendChild(createCriteriaRow(sec.id, idx, item, null, subj.publishers));
        });
      }
      if (sec.subcategories) {
        let globalIdx = 0;
        sec.subcategories.forEach(subcat => {
          subcat.items.forEach((item, idx) => {
            body.appendChild(createCriteriaRow(sec.id, globalIdx, item, subcat.sub, subj.publishers));
            globalIdx++;
          });
        });
      }

      card.appendChild(body);
      container.appendChild(card);
    });
  });

  // Load existing comment
  const commentKey = currentSubject + '_comment';
  document.getElementById('comment').value = scores[commentKey] || '';
  document.getElementById('comment').onchange = () => {
    scores[currentSubject + '_comment'] = document.getElementById('comment').value;
  };
}

function createCriteriaRow(sectionId, idx, text, subcategory, publishers) {
  const row = document.createElement('div');
  row.className = 'criteria-row';

  const textDiv = document.createElement('div');
  textDiv.className = 'criteria-text';
  if (subcategory) {
    textDiv.innerHTML = `<span class="criteria-subcategory">${subcategory}</span>${text}`;
  } else {
    textDiv.textContent = text;
  }
  row.appendChild(textDiv);

  const scoresDiv = document.createElement('div');
  scoresDiv.className = 'scores-container';

  publishers.forEach(pub => {
    const pubDiv = document.createElement('div');
    pubDiv.className = 'pub-score-row';

    const label = document.createElement('div');
    label.className = 'publisher-label mobile-pub-label';
    label.textContent = pub;
    label.style.display = 'none'; // Shown on mobile via CSS media query
    pubDiv.appendChild(label);

    const btnGroup = document.createElement('div');
    btnGroup.className = 'score-group';

    [4, 3, 2, 1].forEach(score => {
      const btn = document.createElement('button');
      btn.className = 'score-btn';
      btn.textContent = score;

      const scoreKey = `${currentSubject}_${sectionId}_${idx}_${pub}`;
      if (scores[scoreKey] === score) {
        btn.classList.add('selected-' + score);
      }

      btn.onclick = () => {
        // Toggle off if same score clicked
        if (scores[scoreKey] === score) {
          delete scores[scoreKey];
        } else {
          scores[scoreKey] = score;
        }
        // Re-render button group
        btnGroup.querySelectorAll('.score-btn').forEach(b => {
          b.className = 'score-btn';
          if (scores[scoreKey] === parseInt(b.textContent)) {
            b.classList.add('selected-' + b.textContent);
          }
        });
        updateSummary();
        updateProgress();
      };

      btnGroup.appendChild(btn);
    });

    pubDiv.appendChild(btnGroup);
    scoresDiv.appendChild(pubDiv);
  });

  row.appendChild(scoresDiv);
  return row;
}

// ══════════════════════════════════════════════════════════════

function updateProgress() {
  const subj = SUBJECTS[currentSubject];
  let total = 0;
  let filled = 0;

  const allParts = subj.partA ? ['A', 'B'] : ['A'];
  allParts.forEach(pk => {
    (subj.sections[pk] || []).forEach(sec => {
      let count = 0;
      if (sec.items) count = sec.items.length;
      if (sec.subcategories) sec.subcategories.forEach(sc => count += sc.items.length);

      subj.publishers.forEach(pub => {
        for (let i = 0; i < count; i++) {
          total++;
          if (scores[`${currentSubject}_${sec.id}_${i}_${pub}`]) filled++;
        }
      });
    });
  });

  const pct = total > 0 ? Math.round(filled / total * 100) : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${filled} / ${total} 已評分 (${pct}%)`;
}

function updateSummary() {
  const subj = SUBJECTS[currentSubject];
  const table = document.getElementById('summary-table');

  let html = '<tr><th>評審項目</th>';
  subj.publishers.forEach(pub => html += `<th>${pub}</th>`);
  html += '</tr>';

  const totals = {};
  subj.publishers.forEach(pub => totals[pub] = 0);

  const allParts = subj.partA ? ['A', 'B'] : ['A'];
  allParts.forEach(pk => {
    (subj.sections[pk] || []).forEach(sec => {
      html += `<tr><td style="text-align:left">${sec.title}</td>`;
      let count = 0;
      if (sec.items) count = sec.items.length;
      if (sec.subcategories) sec.subcategories.forEach(sc => count += sc.items.length);

      subj.publishers.forEach(pub => {
        let sum = 0;
        let n = 0;
        for (let i = 0; i < count; i++) {
          const v = scores[`${currentSubject}_${sec.id}_${i}_${pub}`];
          if (v) { sum += v; n++; }
        }
        totals[pub] += sum;
        html += `<td>${sum > 0 ? sum : '-'}</td>`;
      });
      html += '</tr>';
    });
  });

  html += '<tr class="total-row"><td style="text-align:left"><strong>合計</strong></td>';
  subj.publishers.forEach(pub => html += `<td><strong>${totals[pub] || '-'}</strong></td>`);
  html += '</tr>';

  table.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════
//  Submit to Firebase
// ══════════════════════════════════════════════════════════════

function submitForm() {
  if (!currentTeacher) { showToast('請先登入'); return; }

  // Collect all scores for current subject
  const subj = SUBJECTS[currentSubject];
  const result = {
    teacher: currentTeacher,
    subject: currentSubject,
    subjectName: subj.name,
    timestamp: new Date().toISOString(),
    date: new Date().toLocaleDateString('zh-HK'),
    comment: scores[currentSubject + '_comment'] || '',
    scores: {},
    totals: {}
  };

  const allParts = subj.partA ? ['A', 'B'] : ['A'];
  subj.publishers.forEach(pub => result.totals[pub] = 0);

  allParts.forEach(pk => {
    (subj.sections[pk] || []).forEach(sec => {
      let count = 0;
      if (sec.items) count = sec.items.length;
      if (sec.subcategories) sec.subcategories.forEach(sc => count += sc.items.length);

      subj.publishers.forEach(pub => {
        for (let i = 0; i < count; i++) {
          const key = `${sec.id}_${i}_${pub}`;
          const val = scores[`${currentSubject}_${key}`];
          if (val) {
            result.scores[key] = val;
            result.totals[pub] += val;
          }
        }
      });
    });
  });

  // Check if any score filled
  if (Object.keys(result.scores).length === 0) {
    showToast('請至少填寫一項評分');
    return;
  }

  if (firebaseReady) {
    // Flatten scores keys: replace dots with underscores (Firestore field name restriction)
    const safeScores = {};
    Object.entries(result.scores).forEach(([k, v]) => {
      safeScores[k.replace(/\./g, '_')] = v;
    });
    result.scores = safeScores;

    // If editing an existing record, update it; otherwise add new
    const savePromise = editingDocId
      ? db.collection('evaluations').doc(editingSubject).collection('records').doc(editingDocId).set(result)
      : db.collection('evaluations').doc(currentSubject).collection('records').add(result);

    savePromise.then(() => {
      if (editingDocId) {
        showToast('已更新評分！');
        editingDocId = null;
        editingSubject = null;
        showPage('admin');
        loadAdminData();
      } else {
        editingDocId = null;
        editingSubject = null;
        document.getElementById('success-subject').textContent = '「' + subj.name + '」';
        showPage('success');
        window.scrollTo(0, 0);
      }
    }).catch(err => {
      console.error('Firestore error:', err);
      alert('提交失敗：' + err.code + '\n' + err.message + '\n\n請確認：\n1. Firebase Console 已啟用 Firestore\n2. Firestore Rules 已設為 allow read, write: true');
      saveLocal(result);
    });
  } else {
    saveLocal(result);
    alert('Firebase 未連線！\n\n請打開瀏覽器 Console (F12) 查看錯誤訊息。');
  }
}

function saveLocal(result) {
  const key = 'eval_' + result.subject + '_' + Date.now();
  localStorage.setItem(key, JSON.stringify(result));
}

function clearForm() {
  if (!confirm('確定要清除「' + SUBJECTS[currentSubject].name + '」的所有評分嗎？')) return;
  const prefix = currentSubject + '_';
  Object.keys(scores).forEach(k => {
    if (k.startsWith(prefix)) delete scores[k];
  });
  renderForm();
  updateSummary();
  updateProgress();
  showToast('已清除');
}

// ══════════════════════════════════════════════════════════════
//  Admin Panel
// ══════════════════════════════════════════════════════════════

let adminView = 'summary';

function switchAdminView(view) {
  adminView = view;
  document.getElementById('btn-view-summary').classList.toggle('active-view', view === 'summary');
  document.getElementById('btn-view-detail').classList.toggle('active-view', view === 'detail');
  document.getElementById('admin-summary').style.display = view === 'summary' ? '' : 'none';
  document.getElementById('admin-detail').style.display = view === 'detail' ? '' : 'none';
}

function loadAdminData() {
  if (!firebaseReady) {
    loadAdminFromLocal();
    return;
  }

  db.collection('evaluations').doc(adminSubject).collection('records').get().then(snapshot => {
    if (snapshot.empty) {
      document.getElementById('admin-summary-content').innerHTML = '<p style="color:var(--text-light);">暫無評分記錄</p>';
      document.getElementById('admin-detail-content').innerHTML = '<p style="color:var(--text-light);">暫無評分記錄</p>';
      return;
    }
    const records = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderAdminSummary(records);
    renderAdminDetail(records);
  }).catch(() => {
    loadAdminFromLocal();
  });
}

function loadAdminFromLocal() {
  const records = [];
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('eval_' + adminSubject + '_')) {
      try {
        records.push(JSON.parse(localStorage.getItem(key)));
      } catch(e) {}
    }
  }
  if (records.length === 0) {
    document.getElementById('admin-summary-content').innerHTML = '<p style="color:var(--text-light);">暫無評分記錄（本地）</p>';
    document.getElementById('admin-detail-content').innerHTML = '<p style="color:var(--text-light);">暫無評分記錄（本地）</p>';
    return;
  }
  renderAdminSummary(records);
  renderAdminDetail(records);
}

function renderAdminSummary(records) {
  const subj = SUBJECTS[adminSubject];
  const avgTotals = {};
  subj.publishers.forEach(pub => avgTotals[pub] = []);

  records.forEach(rec => {
    subj.publishers.forEach(pub => {
      if (rec.totals && rec.totals[pub]) {
        avgTotals[pub].push(rec.totals[pub]);
      }
    });
  });

  let html = `<p style="margin-bottom:12px;">共 <strong>${records.length}</strong> 位教師已提交評分</p>`;
  html += '<table class="summary-table"><tr><th>出版社</th><th>平均總分</th><th>最高分</th><th>最低分</th><th>提交人數</th></tr>';

  subj.publishers.forEach(pub => {
    const arr = avgTotals[pub];
    if (arr.length > 0) {
      const avg = (arr.reduce((a, b) => a + b, 0) / arr.length).toFixed(1);
      const max = Math.max(...arr);
      const min = Math.min(...arr);
      html += `<tr><td><strong>${pub}</strong></td><td>${avg}</td><td>${max}</td><td>${min}</td><td>${arr.length}</td></tr>`;
    } else {
      html += `<tr><td><strong>${pub}</strong></td><td>-</td><td>-</td><td>-</td><td>0</td></tr>`;
    }
  });

  html += '</table>';

  // Per-section average
  html += '<h4 style="margin-top:20px; color:var(--primary);">各項目平均分</h4>';
  html += '<table class="summary-table"><tr><th>評審項目</th>';
  subj.publishers.forEach(pub => html += `<th>${pub}</th>`);
  html += '</tr>';

  const allParts = subj.partA ? ['A', 'B'] : ['A'];
  allParts.forEach(pk => {
    (subj.sections[pk] || []).forEach(sec => {
      html += `<tr><td style="text-align:left">${sec.title}</td>`;
      let count = 0;
      if (sec.items) count = sec.items.length;
      if (sec.subcategories) sec.subcategories.forEach(sc => count += sc.items.length);

      subj.publishers.forEach(pub => {
        let grandSum = 0;
        let grandN = 0;
        records.forEach(rec => {
          if (!rec.scores) return;
          for (let i = 0; i < count; i++) {
            const v = rec.scores[`${sec.id}_${i}_${pub}`];
            if (v) { grandSum += v; grandN++; }
          }
        });
        html += `<td>${grandN > 0 ? (grandSum / grandN).toFixed(1) : '-'}</td>`;
      });
      html += '</tr>';
    });
  });
  html += '</table>';

  document.getElementById('admin-summary-content').innerHTML = html;
}

function renderAdminDetail(records) {
  const subj = SUBJECTS[adminSubject];
  let html = '';

  records.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  records.forEach(rec => {
    html += '<div class="result-row" style="position:relative;">';
    html += `<div style="display:flex; justify-content:space-between; align-items:flex-start;">`;
    html += `<div><div class="result-teacher">${rec.teacher || '未知'}</div>`;
    html += `<div class="result-date">${rec.date || ''} ${rec.timestamp ? new Date(rec.timestamp).toLocaleTimeString('zh-HK') : ''}</div></div>`;
    if (rec.id) {
      html += `<div style="display:flex; gap:6px;">`;
      html += `<button class="btn btn-outline" style="padding:4px 10px; font-size:0.75em; flex:none;" onclick="editRecord('${adminSubject}','${rec.id}')">編輯</button>`;
      html += `<button class="btn btn-danger" style="padding:4px 10px; font-size:0.75em; flex:none;" onclick="deleteRecord('${adminSubject}','${rec.id}')">刪除</button>`;
      html += `</div>`;
    }
    html += `</div>`;
    html += '<div class="result-scores">';

    subj.publishers.forEach(pub => {
      const total = rec.totals && rec.totals[pub] ? rec.totals[pub] : 0;
      html += `<span style="margin-right:16px;"><strong>${pub}：</strong>${total}分</span>`;
    });

    if (rec.comment) {
      html += `<div style="margin-top:4px; font-size:0.85em; color:var(--text-light);">評語：${rec.comment}</div>`;
    }
    html += '</div></div>';
  });

  document.getElementById('admin-detail-content').innerHTML = html || '<p>暫無記錄</p>';
}

// ══════════════════════════════════════════════════════════════
//  Admin Edit & Delete
// ══════════════════════════════════════════════════════════════

function deleteRecord(subject, docId) {
  if (!confirm('確定要刪除這筆評分記錄嗎？')) return;
  db.collection('evaluations').doc(subject).collection('records').doc(docId).delete().then(() => {
    showToast('已刪除');
    loadAdminData();
  }).catch(err => {
    showToast('刪除失敗：' + err.message);
  });
}

function editRecord(subject, docId) {
  // Load the record and populate the evaluation form for editing
  db.collection('evaluations').doc(subject).collection('records').doc(docId).get().then(doc => {
    if (!doc.exists) { showToast('找不到記錄'); return; }
    const data = doc.data();

    // Set the subject
    currentSubject = data.subject || subject;
    currentTeacher = data.teacher || '管理員';
    editingDocId = docId;
    editingSubject = subject;

    // Load scores into state
    const prefix = currentSubject + '_';
    // Clear existing scores for this subject
    Object.keys(scores).forEach(k => { if (k.startsWith(prefix)) delete scores[k]; });

    // Restore scores
    if (data.scores) {
      Object.entries(data.scores).forEach(([k, v]) => {
        scores[prefix + k] = v;
      });
    }
    if (data.comment) {
      scores[currentSubject + '_comment'] = data.comment;
    }

    // Switch to eval page in edit mode
    document.getElementById('display-teacher').textContent = currentTeacher + '（管理員編輯中）';
    document.getElementById('display-date').textContent = data.date || new Date().toLocaleDateString('zh-HK');
    showPage('eval');
    renderSubjectTabs();
    renderForm();
    updateSummary();
    updateProgress();
    showToast('正在編輯「' + (data.teacher || '') + '」的評分');
  }).catch(err => {
    showToast('載入失敗：' + err.message);
  });
}

let editingDocId = null;
let editingSubject = null;

// ══════════════════════════════════════════════════════════════
//  Toast
// ══════════════════════════════════════════════════════════════

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Auto-init Firebase on page load
window.addEventListener('DOMContentLoaded', () => {
  if (typeof firebase !== 'undefined') {
    initFirebase(firebaseConfig);
  }
});
